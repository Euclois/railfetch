<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- CRT Screen background with double green border -->
  <rect width="512" height="512" rx="72" fill="#000000" stroke="#00ff66" stroke-width="16"/>
  <rect x="24" y="24" width="464" height="464" rx="48" fill="none" stroke="#00ff66" stroke-dasharray="12,12" stroke-width="4" opacity="0.6"/>
  
  <!-- Terminal Prompt symbol -->
  <text x="60" y="180" font-family="'Departure Mono', Courier, monospace" font-size="110" font-weight="bold" fill="#00ff66" filter="drop-shadow(0px 0px 8px rgba(0, 255, 102, 0.8))">&gt;_</text>
  
  <!-- Retro Pixel Train Locomotive Drawing -->
  <!-- Cab and chassis -->
  <path d="M 120 320 L 392 320 L 392 380 L 120 380 Z" fill="#00ff66" filter="drop-shadow(0px 0px 6px rgba(0, 255, 102, 0.6))"/>
  <path d="M 180 270 L 332 270 L 332 320 L 180 320 Z" fill="#00ff66" filter="drop-shadow(0px 0px 6px rgba(0, 255, 102, 0.6))"/>
  <!-- Funnel -->
  <path d="M 330 230 L 360 230 L 360 270 L 330 270 Z" fill="#00ff66"/>
  <!-- Wheels -->
  <circle cx="160" cy="410" r="22" fill="#00ff66"/>
  <circle cx="230" cy="410" r="22" fill="#00ff66"/>
  <circle cx="300" cy="410" r="22" fill="#00ff66"/>
  <circle cx="370" cy="410" r="22" fill="#00ff66"/>
  <!-- Tracks line -->
  <line x1="60" y1="440" x2="452" y2="440" stroke="#00ff66" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
</svg>
